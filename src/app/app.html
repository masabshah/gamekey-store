<main class="min-h-screen bg-slate-950 flex flex-col p-6 text-slate-100">
  <header>
    <h1>🎮 GameKey Store</h1>
    <nav>
      <!-- routerLinkActive applies active-link CSS class if route matches URL -->
      <a routerLink="/games" routerLinkActive="active-link">Catalog Inventory</a>
      <a routerLink="/games/add" routerLinkActive="active-link">Add Game</a>
      
      <!-- Cart Summary Display -->
      <div class="cart-summary">
        🛒 Cart: <strong>{{ cartService.totalItems() }}</strong> items 
        (Total: <strong>${{ cartService.totalPrice() | number:'1.2-2' }}</strong>)
      </div>
      
      <!-- Login Simulation Buttons -->
      <button *ngIf="!isLoggedIn()" (click)="simulateLogin()" class="sim-btn login-btn">
        Login
      </button>
      <button *ngIf="isLoggedIn()" (click)="simulateLogout()" class="sim-btn logout-btn">
        Logout
      </button>
    </nav>
  </header>

  <!-- router-outlet is the placeholder viewport for routed components -->
  <router-outlet></router-outlet>
</main>
